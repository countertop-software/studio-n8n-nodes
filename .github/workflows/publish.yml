name: Publish to npm

on:
  workflow_run:
    workflows:
      - Bump prerelease version (main)
    types:
      - completed

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Show package version
        run: node -p "require('./package.json').version"

      - name: Ensure this is an alpha prerelease
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: $VERSION"
          case "$VERSION" in
            *-alpha.*) echo "Alpha version detected, continuing." ;;
            *)
              echo "Version is not an alpha prerelease, stopping."
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish