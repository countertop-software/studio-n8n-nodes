name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Welche Version soll erhöht werden?"
        required: true
        default: "prerelease"
        type: choice
        options:
          - prerelease
          - patch
          - minor
          - major
      preid:
        description: "Prerelease-Label (nur bei prerelease)"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - beta

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.release_type }}" = "prerelease" ]; then
            NEW_VERSION=$(npm version prerelease --preid=${{ inputs.preid }} -m "chore(release): %s [skip ci]")
          else
            NEW_VERSION=$(npm version ${{ inputs.release_type }} -m "chore(release): %s [skip ci]")
          fi

          echo "new_version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"

      - run: git push origin main --follow-tags

  publish:
    needs: bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Publish package
        run: |
          VERSION="${{ needs.bump.outputs.new_version }}"

          case "$VERSION" in
            *-alpha.*)
              npm publish --access public --tag alpha
              ;;
            *-beta.*)
              npm publish --access public --tag beta
              ;;
            *)
              npm publish --access public
              ;;
          esac